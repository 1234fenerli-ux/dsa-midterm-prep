<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DSA Midterm Prep</title>

<style>
body { font-family: Arial; text-align: center; background:#f5f5f5; }
button { padding:10px; margin:5px; cursor:pointer; }
.card { background:white; margin:10px auto; padding:15px; width:60%; border-radius:10px; }
</style>

</head>
<body>

<h1>📚 DSA Midterm Prep</h1>

<div>
<button onclick="show('topics')">Topics</button>
<button onclick="show('quiz')">Quiz</button>
<button onclick="show('flash')">Flashcards</button>
</div>

<div id="app"></div>

<script>
const topics = [
{title:"Stack", content:"LIFO structure"},
{title:"Queue", content:"FIFO structure"},
{title:"Big-O", content:"Time complexity"}
];

const quiz = [
{q:"Stack follows?", o:["FIFO","LIFO"], a:"LIFO"},
{q:"Queue follows?", o:["FIFO","LIFO"], a:"FIFO"}
];

const flash = [
{q:"LIFO", a:"Last In First Out"},
{q:"FIFO", a:"First In First Out"}
];

function show(type){
if(type==="topics"){
app.innerHTML = topics.map(t =>
`<div class="card"><h3>${t.title}</h3><p>${t.content}</p></div>`
).join("");
}

if(type==="quiz"){
app.innerHTML = quiz.map((q,i)=>
`<div class="card">
<p>${q.q}</p>
${q.o.map(o=>`<button onclick="check(${i},'${o}')">${o}</button>`).join("")}
</div>`
).join("");
}

if(type==="flash"){
app.innerHTML = flash.map(f =>
`<div class="card" onclick="this.innerHTML='<p>${f.a}</p>'">
<p>${f.q}</p>
</div>`
).join("");
}
}

function check(i,ans){
alert(ans===quiz[i].a ? "Correct!" : "Wrong!");
}

show("topics");
</script>

</body>
</html>
